name: GCP Offer Services — test

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      kms_url:
        type: string
        required: false
        default: ""

jobs:
  test:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    env:
      GCP_DOMAIN: ${{ vars.GCP_DOMAIN }}
      GCP_BFE_HOST: ${{ vars.GCP_BFE_HOST }}
      SECURE_INVOKE_IMAGE: ${{ vars.SECURE_INVOKE_IMAGE }}
      OPERATOR: ispirt
      ENV: ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Secure invoke test
        env:
          KMS_URL: ${{ inputs.kms_url }}
        run: |
          set -euo pipefail
          test -n "${GCP_DOMAIN}" || { echo "::error::Set variable GCP_DOMAIN"; exit 1; }
          test -f "${GITHUB_WORKSPACE}/tools/requests/get_bids_request1.json" || { echo "::error::Missing get_bids_request1.json at repo root"; exit 1; }

          if [ -n "${GCP_BFE_HOST:-}" ]; then
            HOST_ADDR="${GCP_BFE_HOST}"
          else
            HOST_ADDR="${OPERATOR}-${ENV}.bfe.${GCP_DOMAIN}:443"
          fi

          echo "## secure_invoke" >> "$GITHUB_STEP_SUMMARY"
          echo "**host_addr:** \`${HOST_ADDR}\`" >> "$GITHUB_STEP_SUMMARY"

          # When KMS URL is provided (test_mode=false), fetch live keys
          INVOKE_EXTRA_ARGS=""
          if [ -n "${KMS_URL}" ]; then
            echo "Fetching live public keys from ${KMS_URL}/app/listpubkeys ..."
            LIVE_KEYS=$(curl -sf "${KMS_URL}/app/listpubkeys")
            PUBLIC_KEY=$(echo "$LIVE_KEYS" | jq -r '.keys[0].key')
            KEY_ID=$(echo "$LIVE_KEYS" | jq -r '.keys[0].id')
            echo "**KMS key_id:** \`${KEY_ID}\`" >> "$GITHUB_STEP_SUMMARY"
            INVOKE_EXTRA_ARGS="--public_key=${PUBLIC_KEY} --key_id=${KEY_ID}"
          fi

          run_container() {
            docker run --rm \
              -v "${GITHUB_WORKSPACE}/tools/requests/get_bids_request1.json:/data/get_bids_request.json:ro" \
              --entrypoint /secure_invoke/invoke \
              "${SECURE_INVOKE_IMAGE}" \
              --op=invoke \
              --target_service=BFE \
              --input_file=/data/get_bids_request.json \
              --host_addr="${HOST_ADDR}" \
              --client_type=CLIENT_TYPE_BROWSER \
              --insecure=false \
              --client_ip=192.168.1.1 \
              ${INVOKE_EXTRA_ARGS}
          }

          if [ -n "${SECURE_INVOKE_IMAGE:-}" ]; then
            echo "Pulling ${SECURE_INVOKE_IMAGE}"
            docker pull "${SECURE_INVOKE_IMAGE}"
            echo "Using prebuilt image (retries apply to **run** only)." >> "$GITHUB_STEP_SUMMARY"

            MAX=4
            DELAY=120
            for i in $(seq 1 "${MAX}"); do
              echo "Attempt ${i}/${MAX}..."
              if run_container; then
                echo "Succeeded on attempt ${i}." >> "$GITHUB_STEP_SUMMARY"
                exit 0
              fi
              [ "${i}" -lt "${MAX}" ] && sleep "${DELAY}"
            done
            echo "::error::secure_invoke failed after ${MAX} attempts"
            exit 1
          fi

          echo "::error::Set repository variable SECURE_INVOKE_IMAGE (e.g. ispirt.azurecr.io/depainferencing/gcp/secure_invoke:4.10.0)"
          exit 1
